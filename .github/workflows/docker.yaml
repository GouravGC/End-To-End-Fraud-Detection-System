name: Build and Push Docker Image

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
            --label org.opencontainers.image.source=https://github.com/GouravGC/End-To-End-Fraud-Detection-System \
            -t ghcr.io/gouravgc/fraud-detection:latest .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/gouravgc/fraud-detection:latest